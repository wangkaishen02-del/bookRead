<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chapter Flow | 读书计划</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Outfit:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <div class="brand-block">
          <p class="eyebrow">Reading Planner</p>
          <h1>Chapter Flow</h1>
        </div>
        <button id="openCreateBtn" class="primary-btn" type="button">新建一本书</button>
      </header>

      <section class="summary-strip">
        <div class="hero-card">
          <div class="stat-pill">
            <span id="activePlansCount">0</span>
            <small>正在读的书</small>
          </div>
          <div class="stat-pill">
            <span id="finishedPlansCount">0</span>
            <small>已读完的书</small>
          </div>
        </div>
      </section>

      <main id="homeView" class="dashboard home-view">
        <section class="panel panel-library panel-reading">
          <div class="panel-heading panel-heading-row">
            <div>
              <button id="openReadingListBtn" class="section-link-btn" type="button">正在读的书</button>
              <p>每张卡片只看两件事：整本书读到哪了，当前阶段任务推进到哪了。</p>
            </div>
            <button id="openReadingListBtnAlt" class="ghost-btn" type="button">查看书单</button>
          </div>
          <div id="plansGrid" class="plans-grid"></div>
        </section>
      </main>
    </div>

    <div id="drawerBackdrop" class="drawer-backdrop hidden"></div>
    <aside id="readingListDrawer" class="side-drawer" aria-hidden="true">
      <section class="drawer-panel drawer-panel-compact">
        <div class="subpage-head">
          <div class="panel-heading">
            <h2>正在读书单</h2>
            <p>这里会列出当前所有进行中的书籍。</p>
          </div>
          <button id="closeReadingListBtn" class="ghost-btn" type="button">关闭</button>
        </div>
        <div id="readingList" class="reading-list"></div>
      </section>
    </aside>
    <aside id="createDrawer" class="create-drawer" aria-hidden="true">
      <section class="drawer-panel">
        <div class="subpage-head">
          <div class="panel-heading">
            <h2>新建读书计划</h2>
            <p>先录入阅读信息，再用章节轴点出你想要的小目标节点。</p>
          </div>
          <button id="closeCreateBtn" class="ghost-btn" type="button">关闭</button>
        </div>
        <form id="planForm" class="plan-form">
          <label>
            书名
            <input type="text" id="title" name="title" placeholder="比如：人类简史" required />
          </label>
          <label>
            备注
            <textarea id="notes" name="notes" rows="3" placeholder="记录为什么想读这本书，或者这次阅读想抓住什么。"></textarea>
          </label>
          <div class="grid-two">
            <label>
              页数
              <input type="number" id="totalPages" name="totalPages" min="1" placeholder="320" required />
            </label>
            <label>
              章节数
              <input type="number" id="chapterCount" name="chapterCount" min="1" placeholder="12" required />
            </label>
          </div>
          <div class="grid-two">
            <label>
              开始日期
              <input type="date" id="startDate" name="startDate" required />
            </label>
            <label>
              计划花费天数
              <input type="number" id="days" name="days" min="1" placeholder="14" required />
            </label>
          </div>
          <div class="grid-two">
            <label>
              卡片主题色
              <select id="theme" name="theme">
                <option value="amber">琥珀黄</option>
                <option value="teal">海盐绿</option>
                <option value="coral">珊瑚橘</option>
                <option value="ink">深墨蓝</option>
              </select>
            </label>
          </div>
          <section class="planner-block">
            <div class="planner-head">
              <div>
                <h3>章节轴</h3>
                <p id="plannerHint">填写章节数后，这里会生成同样数量的节点。点击节点即可设为小目标节点。</p>
              </div>
              <div class="planner-shortcuts">
                <button id="fillAllNodesBtn" class="ghost-btn" type="button">一章一小目标</button>
                <button id="clearNodesBtn" class="ghost-btn" type="button">清空节点</button>
              </div>
            </div>
            <div id="plannerScale" class="planner-scale">尚未生成章节轴</div>
            <div id="plannerTrack" class="planner-track">
              <div id="plannerFill" class="planner-fill"></div>
              <div id="plannerNodes" class="planner-nodes"></div>
            </div>
            <div id="nodeChipList" class="node-chip-list"></div>
            <div class="planner-actions">
              <span class="planner-helper">最后一个章节节点代表全书终点，会始终保留。</span>
              <span id="nodeSummary" class="node-summary">默认会按整本书生成 1 个小目标</span>
            </div>
            <input type="hidden" id="nodePositions" name="nodePositions" />
          </section>
          <div class="form-actions">
            <button type="button" id="cancelCreateBtn" class="ghost-btn">取消</button>
            <button type="submit" class="primary-btn">生成计划</button>
          </div>
        </form>
      </section>
    </aside>

    <template id="planCardTemplate">
      <article class="plan-card">
        <div class="plan-card-top">
          <div>
            <p class="plan-theme-tag"></p>
            <h3 class="plan-title"></h3>
            <p class="plan-author"></p>
          </div>
          <button class="icon-btn delete-btn" aria-label="删除计划">×</button>
        </div>
        <p class="plan-notes"></p>

        <div class="progress-section">
          <div class="section-label">整本书进度</div>
          <div class="progress-block">
            <div class="progress-meta">
              <span class="book-progress-label"></span>
              <span class="book-progress-percent"></span>
            </div>
            <div class="progress-bar">
              <div class="book-progress-fill"></div>
              <div class="milestone-track"></div>
            </div>
          </div>
        </div>

        <div class="plan-stats"></div>

        <div class="stage-callout">
          <div>
            <h4 class="current-task-title">当前小目标进度</h4>
            <p class="current-task-meta">拖动滑杆即可调整当前小目标完成度，整本书进度会自动同步。</p>
          </div>
          <span class="stage-progress-badge"></span>
        </div>

        <div class="manual-update">
          <label>
            调整当前小目标
            <input type="range" class="stage-progress-input" min="0" max="100" step="1" />
          </label>
          <div class="stage-progress-row">
            <span class="stage-progress-min">0%</span>
            <span class="stage-progress-value">0%</span>
            <span class="stage-progress-max">100%</span>
          </div>
        </div>
      </article>
    </template>

    <script type="module" src="./app.js"></script>
  </body>
</html>
